<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Herbster</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:     #F9F8F6;
    --cream-dim: #E0D2B7;
    --gold:      #C9AE8F;
    --gold-deep: #8F4A00;
    --border:    rgba(201,174,143,0.18);
    --border2:   rgba(201,174,143,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: #350503; }

  body {
    font-family: 'Helvetica Now', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow-x: hidden;
    min-height: 100vh;
    background:
      radial-gradient(ellipse 100% 50% at 50% 0%, #60183f 0%, transparent 55%),
      radial-gradient(ellipse 70% 60% at 0% 60%, #623302 0%, transparent 55%),
      radial-gradient(ellipse 70% 60% at 100% 40%, #350503 0%, transparent 55%),
      #350503;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
  }

  /* BANNER */
  .banner {
    width: 100%;
    line-height: 0;
    animation: fadeIn 0.8s ease both;
  }
  .banner img {
    width: 100%;
    height: auto;
    display: block;
    max-height: 260px;
    object-fit: cover;
    object-position: center top;
  }

  /* CONTAINER */
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px 80px;
  }

  /* IDENTITY HEADER */
  .identity {
    width: 100%;
    padding: 36px 0 28px;
    text-align: center;
    animation: fadeUp 0.7s 0.1s ease both;
  }

  .headline {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    font-style: italic;
    color: var(--cream-dim);
    line-height: 1.35;
    margin-bottom: 10px;
  }

  .byline {
    font-family: 'Helvetica Now', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* DIVIDER */
  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin-bottom: 28px;
    animation: fadeUp 0.7s 0.15s ease both;
  }

  /* LINKS */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .link-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0;
    border-bottom: 1px solid var(--border2);
    text-decoration: none;
    color: var(--cream);
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    animation: fadeUp 0.7s ease both;
  }

  .link-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(201,174,143,0.06) 0%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.4s ease;
  }
  .link-item:hover::before { transform: translateX(0); }
  .link-item:hover { padding-left: 6px; }

  .link-item:nth-child(1) { animation-delay: 0.20s; }
  .link-item:nth-child(2) { animation-delay: 0.27s; }
  .link-item:nth-child(3) { animation-delay: 0.34s; }
  .link-item:nth-child(4) { animation-delay: 0.41s; }
  .link-item:nth-child(5) { animation-delay: 0.48s; }

  .link-left { display: flex; flex-direction: column; gap: 3px; }

  .link-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .link-title {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    line-height: 1.1;
    transition: color 0.3s;
  }
  .link-item:hover .link-title { color: var(--gold); }

  .link-arrow {
    font-size: 16px;
    color: var(--gold-deep);
    transition: all 0.3s ease;
    flex-shrink: 0;
    margin-left: 16px;
  }
  .link-item:hover .link-arrow {
    color: var(--gold);
    transform: translate(3px, -3px);
  }

  .link-item.highlight {
    padding: 22px 18px;
    background: rgba(201,174,143,0.06);
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-bottom: 8px;
  }
  .link-item.highlight::before { display: none; }
  .link-item.highlight:hover {
    background: rgba(201,174,143,0.1);
    padding-left: 18px;
  }

  /* LOGO FOOTER */
  .logo-footer {
    margin-top: 48px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.7s 0.6s ease both;
  }
  .footer-line {
    width: 1px;
    height: 28px;
    background: var(--border);
  }
  .logo-wrap img {
    width: 211px;
    height: 25px;
    object-fit: contain;
    opacity: 0.8;
  }
  .footer-tagline {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(201,174,143,0.3);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
